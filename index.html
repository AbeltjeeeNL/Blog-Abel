
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --cream:#FAFAF7;
    --ink:#1A1916;
    --muted:#7A7870;
    --accent:#8A6E4E;
    --border:#E8E6E0;
  }
  body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);}
  .blog{max-width:720px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  nav{display:flex;justify-content:center;align-items:center;padding-bottom:2rem;border-bottom:1px solid var(--border);margin-bottom:3rem;}
  .logo{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:.01em;}
  .logo span{color:var(--accent);font-style:italic;}
  [contenteditable]{outline:none;border-radius:4px;transition:background .15s;}
  [contenteditable]:hover{background:rgba(138,110,78,.07);}
  [contenteditable]:focus{background:rgba(138,110,78,.12);box-shadow:0 0 0 2px rgba(138,110,78,.3);}
  .edit-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;margin-bottom:2rem;display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--muted);}
  .edit-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .hero{margin-bottom:3.5rem;}
  .hero-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);font-weight:500;margin-bottom:.75rem;}
  .hero h1{font-family:'Playfair Display',serif;font-size:2.6rem;line-height:1.2;font-weight:600;margin-bottom:1rem;max-width:580px;}
  .hero p{color:var(--muted);font-size:.95rem;line-height:1.75;max-width:500px;font-weight:300;}
  footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);display:flex;justify-content:center;}
</style>

<div class="blog">
  <nav>
    <div class="logo">Blog-<span>Abel</span></div>
  </nav>

  <div class="edit-bar">
    <div class="edit-dot"></div>
    <span>Bewerkingsmodus actief — klik op een tekst om deze te bewerken</span>
  </div>

  <section class="hero">
    <div class="hero-label" contenteditable="true">Uitgelicht artikel</div>
    <h1 contenteditable="true">Waarom ik elke ochtend een uur eerder opsta</h1>
    <p contenteditable="true">Kleine gewoontes die een groot verschil maken. Over rust, intentie en het vinden van stilte voordat de dag begint.</p>
  </section>

  <footer>
    <div class="logo" style="font-family:'Playfair Display',serif;font-size:1rem;">Blog-<span style="color:var(--accent);font-style:italic;">Abel</span></div>
  </footer>
</div>
