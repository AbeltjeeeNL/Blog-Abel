<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog-Abel</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fdf6e3;
            color: #333;
        }

        header {
            background: #f7e8c9;
            color: #333;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e6d5b8;
        }

        header p {
            margin-top: 5px;
            opacity: 0.7;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 15px;
            text-align: center;
        }

        .empty-state {
            background: #fffaf0;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            color: #777;
        }

        footer {
            text-align: center;
            padding: 10px;
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <h1>Blog-Abel</h1>
    <p>Juahh, dit is mijn blog!</p>
</header>

<div class="container">
    <div class="empty-state">
        <p>Er zijn nog geen blogposts… 👀</p>
        <p>Maar dat komt snel 😉</p>
    </div>
</div>

<footer>
    <p>Blog-Abel</p>
</footer>

</body>
</html>
